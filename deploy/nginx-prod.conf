# AI 伴学小程序 - 生产环境 Nginx 配置
# 文件：/etc/nginx/sites-available/ai-study-prod

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.ai-study.com;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    server_name api.ai-study.com;

    # ==================== SSL 配置 ====================
    
    # 证书路径（使用 Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/api.ai-study.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ai-study.com/privkey.pem;
    
    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL 会话
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==================== 安全头 ====================
    
    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # 其他安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==================== 日志 ====================
    
    access_log /var/log/nginx/ai-study-prod-access.log combined;
    error_log /var/log/nginx/ai-study-prod-error.log warn;

    # ==================== 性能优化 ====================
    
    # 客户端大小限制（文件上传）
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # 代理缓冲
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # ==================== 健康检查（公开） ====================
    
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        access_log off;
        proxy_cache off;
    }

    # ==================== API 接口 ====================
    
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        
        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # HTTP 版本
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 错误处理
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ==================== API 文档（需认证） ====================
    
    location /docs {
        auth_basic "API Documentation - Authorized Personnel Only";
        auth_basic_user_file /etc/ai-study/.htpasswd;
        
        proxy_pass http://127.0.0.1:8001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        auth_basic "API Schema - Authorized Personnel Only";
        auth_basic_user_file /etc/ai-study/.htpasswd;
        
        proxy_pass http://127.0.0.1:8001/openapi.json;
        proxy_set_header Host $host;
    }

    # ==================== ReDoc (可选) ====================
    
    location /redoc {
        auth_basic "API Documentation - Authorized Personnel Only";
        auth_basic_user_file /etc/ai-study/.htpasswd;
        
        proxy_pass http://127.0.0.1:8001/redoc;
        proxy_set_header Host $host;
    }
}
