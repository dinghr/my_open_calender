# AI 伴学小程序 - 测试环境 Nginx 配置
# 文件：/etc/nginx/sites-available/ai-study-test

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name test-api.ai-study.com;
    
    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    return 301 https://$server_name$request_uri;
}

# HTTPS 服务器 (端口 8443)
server {
    listen 8443 ssl http2;
    server_name test-api.ai-study.com;

    # ==================== SSL 配置 ====================
    
    # 证书路径（可以用自签名证书用于测试）
    ssl_certificate /etc/letsencrypt/live/test-api.ai-study.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-api.ai-study.com/privkey.pem;
    
    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL 会话
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ==================== 安全头 ====================
    
    # HSTS (测试环境可以短一些)
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ==================== 日志 ====================
    
    access_log /var/log/nginx/ai-study-test-access.log combined;
    error_log /var/log/nginx/ai-study-test-error.log debug;

    # ==================== 性能优化 ====================
    
    # 客户端大小限制（测试环境可以更大）
    client_max_body_size 50M;
    client_body_buffer_size 256k;

    # ==================== 健康检查（公开） ====================
    
    location = /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ==================== API 接口 ====================
    
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        
        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置（测试环境可以长一些）
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # HTTP 版本
        proxy_http_version 1.1;
    }

    # ==================== API 文档（公开，方便测试） ====================
    
    location /docs {
        proxy_pass http://127.0.0.1:8002/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8002/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8002/redoc;
        proxy_set_header Host $host;
    }
}
